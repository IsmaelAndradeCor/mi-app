<h3>Crear Marca</h3>
<div class="form-section">
    <div class="row">
        <div class="col-6">
            <div class="input-group">
                <span class="input-group-text">Nombre</span>
                <input #inputNombre class="form-control" type="text" autocomplete="off" [(ngModel)]="marcaUpsertDto.nombre" (keydown.enter)="crearMarca(); $event.preventDefault()">
            </div>
        </div>
        <div class="col-2 offset-4">
            <button class="btn btn-success w-100" type="button" (click)="crearMarca()">Crear Marca</button>
        </div>
    </div>
</div>
