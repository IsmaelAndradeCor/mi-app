<h2>Crear Marca</h2>
<div class="form-section">
    <div class="row row-cols-2">
        <div class="col">
            <div class="input-group">
                <span class="input-group-text">Nombre</span>
                <input #inputNombre class="form-control" type="text" autocomplete="off" [(ngModel)]="marcaUpsertDto.nombre" (keydown.enter)="crearMarca(); $event.preventDefault()">
            </div>
        </div>
        <div class="col">
            <button class="btn btn-primary" type="button" (click)="crearMarca()">Crear Marca</button>
        </div>
    </div>
</div>
