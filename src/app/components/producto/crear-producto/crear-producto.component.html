<h2>Crear Producto</h2>
<div class="form-section">
    <div class="row row-cols-sm-1 row-cols-md-6 row-cols-lg-4 g-3 mb-3">
        <div class="col">
            <div class="input-group">
                <span class="input-group-text">Codigo</span>
                <input class="form-control" type="text" autocomplete="off" [(ngModel)]="productoUpsertDto.codigo">
            </div>
        </div>
        <div class="col">
            <div class="input-group">
                <span class="input-group-text">Nombre</span>
                <input class="form-control" type="text" autocomplete="off" [(ngModel)]="productoUpsertDto.nombre">
            </div>
        </div>
        <div class="col">
            <div class="input-group">
                <span class="input-group-text">Descripcion</span>
                <input class="form-control" type="text" autocomplete="off" [(ngModel)]="productoUpsertDto.descripcion">
            </div>
        </div>
        <div class="col">
            <div class="input-group">
                <span class="input-group-text">Marca</span>
                <select class="form-select" name="selectMarca" id="selectMarca" [(ngModel)]="productoUpsertDto.idMarca">
                    <option value="{{productoUpsertDto.idMarca}}" selected>Selecciona Marca</option>
                    @for (m of marcas; track $index) {
                    <option [ngValue]="m.id">{{m.nombre}}</option>
                    }
                </select>            
            </div>
        </div>
        <div class="col">
            <div class="input-group">
                <span class="input-group-text">Costo</span>
                <input class="form-control" type="text" autocomplete="off" [(ngModel)]="productoUpsertDto.costo">
            </div>
        </div>
        <div class="col">
            <div class="input-group">
                <span class="input-group-text">Precio</span>
                <input class="form-control" type="text" autocomplete="off" [(ngModel)]="productoUpsertDto.precio">
            </div>
        </div>
        <div class="col">
            <div class="input-group">
                <span class="input-group-text">Stock</span>
                <input class="form-control" type="text" autocomplete="off" [(ngModel)]="productoUpsertDto.stock">
            </div>
        </div>
        <div class="col">
            <div class="input-group">
                <span class="input-group-text">Stock Minimo</span>
                <input class="form-control" type="text" autocomplete="off" [(ngModel)]="productoUpsertDto.stockMinimo">
            </div>
        </div>
        <div class="col">
            <div class="input-group">
                <span class="input-group-text">Categoria</span>
                <input class="form-control" type="text" autocomplete="off" >
            </div>
        </div>
        <div class="col">
            <div class="input-group">
                <span class="input-group-text">Proveedor</span>
                <select class="form-select" name="selectProveedor" id="selectProveedor" [(ngModel)]="selectedProveedor">
                    <option value="{{selectedProveedor}}" selected>Selecciona Proveedor</option>
                    @for (m of proveedores; track $index) {
                    <option [ngValue]="m.id">{{m.nombre}}</option>
                    }
                </select>            
            </div>
        </div>
        <div class="col">
            <button class="btn btn-primary w-100" type="button" (click)="agregarProveedor()">Agregar Proveedor</button>
        </div>
    </div>
    <div class="row row-cols-sm-1 row-cols-md-6 row-cols-lg-4 g-3 d-flex justify-content-end">
        <div class="col">
            <button class="btn btn-success w-100" type="button" (click)="agregarProducto()">Cargar Producto</button>
        </div>
    </div>
</div>

<pre>{{productoUpsertDto | json}}</pre>
